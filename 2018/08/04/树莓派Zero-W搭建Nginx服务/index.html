  <section class="article-entry">
    <p>树莓派上安装Nginx服务十分简单，一条命令搞定</p>
<figure class="highlight actionscript"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo apt-<span class="keyword">get</span> install nginx -y</span><br></pre></td></tr></table></figure>
<p>待安装完成后即可。Nginx默认配置文件位于</p>
<figure class="highlight gradle"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo vi <span class="regexp">/etc/</span>nginx<span class="regexp">/sites-available/</span><span class="keyword">default</span></span><br></pre></td></tr></table></figure>
<p>根目录默认位于</p>
<figure class="highlight gradle"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo vi <span class="regexp">/usr/</span>share<span class="regexp">/nginx/</span>html<span class="regexp">/index.html</span></span><br></pre></td></tr></table></figure>
<p>启动Nginx命令</p>
<figure class="highlight dos"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo /etc/init.d/nginx <span class="built_in">start</span></span><br></pre></td></tr></table></figure>

  </section>
