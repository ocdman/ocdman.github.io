  <section class="article-entry">
    <p>我们知道Go语言编译起来很方便，大部分情况下只需要一条命令</p>
<figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">go</span> build</span><br></pre></td></tr></table></figure>
<p>但是这条命令执行后，默认生成的可执行文件名是文件夹名。如果想在编译后指定可执行文件的别名，需要执行如下命令</p>
<figure class="highlight armasm"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="label">go</span> <span class="keyword">build </span>-o <span class="preprocessor">ALIAS</span></span><br></pre></td></tr></table></figure>
<p>其中ALIAS就是别名。</p>

  </section>
