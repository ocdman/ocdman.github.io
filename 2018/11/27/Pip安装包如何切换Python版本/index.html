  <section class="article-meta">
    <p class="article-date">November 27 2018</p>
  </section>

  <section class="article-entry">
    <p>在有了Py Launcher工具之后，可以方便地切换Python 2.X和Python 3.X，再也不用为一台电脑上安装两个版本的Python而烦恼。但是如果要通过Pip包管理器来安装Python 2.X的包或者安装Python 3.X的包，需要执行以下命令</p>
<p><figure class="highlight stata"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">py -<span class="keyword">VERSION</span> -<span class="keyword">m</span> pip install PACKAGE_NAME</span><br></pre></td></tr></table></figure></p>
<p>其中<code>VERSION</code>的值为2或者3，<code>PACKAGE_NAME</code>是包名。</p>
