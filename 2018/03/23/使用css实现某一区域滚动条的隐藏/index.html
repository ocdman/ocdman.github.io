  <h1 class="article-title">
    <a href="/2018/03/23/使用css实现某一区域滚动条的隐藏/">使用css实现某一区域滚动条的隐藏</a>

  <section class="article-entry">
    <p>我们都知道，浏览器里某一区域的数据一旦超长，就会出现滚动条。滚动条分为两种，横向和纵向。如何实现纵向滚动条隐藏之后，仍然可以滚动呢？</p>
<p>很简单，如果你要隐藏滚动条的区域的class名称为vertical，那么代码为</p>
<p><figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="class">.vertical</span> <span class="rules">&#123;</span><br><span class="line">  <span class="rule"><span class="attribute">overfollow-y</span>:<span class="value"> scroll</span></span>;</span><br><span class="line">&#125;</span></span><br><span class="line"><span class="rule"><span class="attribute">.vertical</span>:<span class="value">:-webkit-scrollbar &#123;</span><br><span class="line">  display: none</span></span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></p>
<p>区区两行代码就能实现该功能，是不是很简单？当然该方法并不能兼容所有浏览器。就我所知，Chrome肯定是可以的。</p>
