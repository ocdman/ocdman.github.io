  <section class="article-meta">
    <p class="article-date">February 21 2018</p>
  </section>

  <section class="article-entry">
    <p>以下是MongoDB常用命令的汇总。</p>
<ul>
<li>连接数据库</li>
</ul>
<figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">mongo</span><br></pre></td></tr></table></figure>
<ul>
<li>显示已存在的数据库</li>
</ul>
<figure class="highlight nginx"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="title">show</span> dbs</span><br></pre></td></tr></table></figure>
<ul>
<li>切换数据库</li>
</ul>
<figure class="highlight actionscript"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">use</span> dbname</span><br></pre></td></tr></table></figure>
<ul>
<li>查看所有集合（相当于关系型数据库里的表）</li>
</ul>
<figure class="highlight nginx"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="title">show</span> collections</span><br></pre></td></tr></table></figure>
<ul>
<li>对某个集合foo进行查询</li>
</ul>
<figure class="highlight stylus"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">db<span class="class">.foo</span><span class="class">.find</span>()</span><br></pre></td></tr></table></figure>
<ul>
<li>对集合foo里的某个属性a进行查询，并且a的值为1</li>
</ul>
<figure class="highlight less"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">db</span><span class="class">.foo</span><span class="class">.find</span>(&#123;<span class="attribute">a</span>:<span class="number">1</span>&#125;)</span><br></pre></td></tr></table></figure>

  </section>
