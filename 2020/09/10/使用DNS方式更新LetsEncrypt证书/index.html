  <h1 class="article-title">
    <a href="/2020/09/10/使用DNS方式更新LetsEncrypt证书/">使用ACME的DNS方式更新LetsEncrypt证书</a>
  </h1>

  <section class="article-meta">
    <p class="article-date">September 10 2020</p>
  </section>

  <section class="article-entry">
    <p>使用acme的DNS方式更新Let’s Encrypt证书时，不需要公网IP，只需要DNS解析记录即可完成验证。如果说有什么缺点，那就是域名解析商不提供DNS API的话，每次需要手动解析域名。</p>
<p>以下是执行命令，它支持以通配符方式，注册域名。</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">acme.sh --issue --dns <span class="operator">-d</span> mydomain.com <span class="operator">-d</span> <span class="string">'*.mydomain.com'</span></span><br></pre></td></tr></table></figure>
<p>如果是第二次执行，需要执行以下命令</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">acme.sh  --renew <span class="operator">-d</span> mydomain.com <span class="operator">-d</span> <span class="string">'*.mydomain.com'</span></span><br></pre></td></tr></table></figure>

  </section>
</article>
