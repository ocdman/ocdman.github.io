    <a href="/2019/04/18/如何ping指定端口号/">如何ping指定端口号</a>
  </h1>

  <section class="article-meta">
    <p class="article-date">April 18 2019</p>
  </section>

  <section class="article-entry">
    <p>电信的默认封了80、443等最常用的端口，如果你的网站绑定的是其它端口，直接使用ping命令是ping不通的，因为ping命令默认无法指定端口号。</p>
<p>下面是Windows版本的<a href="http://www.elifulkerson.com/projects/tcping.php" target="_blank" rel="external">tcping软件</a>，通过该软件可以达到ping指定端口号。</p>
<p>下载完成之后，将tcping.exe文件放入<code>C:\Windows\System32</code>文件夹下即可。使用方法为</p>
<p><figure class="highlight accesslog"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">tcping <span class="string">[domain]</span> <span class="string">[port]</span></span><br></pre></td></tr></table></figure></p>

  </section>
</article>
